<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Choose Gift</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<div class="page">

    <div class="topBanner">

        <img src="assets/topban.png">

    </div>

    <div class="title">

        <h2>🎁 Choose Your Lucky Gift</h2>

        <p>You have <span id="chance">3</span> chances remaining</p>

    </div>

    <div class="giftGrid">

        <div class="gift" data-id="1">
            <img src="assets/gift.png">
        </div>

        <div class="gift" data-id="2">
            <img src="assets/gift.png">
        </div>

        <div class="gift" data-id="3">
            <img src="assets/gift.png">
        </div>

        <div class="gift" data-id="4">
            <img src="assets/gift.png">
        </div>

        <div class="gift" data-id="5">
            <img src="assets/gift.png">
        </div>

        <div class="gift" data-id="6">
            <img src="assets/gift.png">
        </div>

        <div class="gift" data-id="7">
            <img src="assets/gift.png">
        </div>

        <div class="gift" data-id="8">
            <img src="assets/gift.png">
        </div>

        <div class="gift" data-id="9">
            <img src="assets/gift.png">
        </div>

    </div>

    <div class="community">

        <h2>💬 Community Discussion</h2>

        <div id="comments">

        </div>

        <div class="addComment">

            <input
            id="name"
            placeholder="Your Name">

            <textarea
            id="msg"
            placeholder="Write a comment..."></textarea>

            <button id="postBtn">

                Post Comment

            </button>

        </div>

    </div>

</div>

<div id="popup">

    <div class="popupCard">

        <img id="popupImg">

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
