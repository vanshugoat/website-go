<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0">

<title>Congratulations</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:
linear-gradient(180deg,#050505,#101010);

color:white;

overflow-x:hidden;

}

.banner{

padding:15px;

}

.banner img{

width:100%;

border-radius:18px;

box-shadow:0 10px 40px rgba(255,180,0,.25);

}

.card{

margin:18px;

background:#151515;

border-radius:22px;

padding:25px;

text-align:center;

border:1px solid rgba(255,255,255,.06);

box-shadow:0 15px 40px rgba(0,0,0,.45);

animation:fadeUp .8s ease;

}

.success{

font-size:55px;

animation:bounce 2s infinite;

}

h1{

margin-top:10px;

font-size:32px;

font-weight:800;

}

p{

margin-top:15px;

opacity:.85;

line-height:1.7;

}

.prize{

margin-top:25px;

}

.prize img{

width:230px;

animation:float 2.8s infinite ease-in-out;

filter:drop-shadow(0 0 35px gold);

}

.verify{

margin-top:25px;

padding:18px;

background:#1d1d1d;

border-radius:16px;

font-size:15px;

line-height:1.6;

}

button{

margin-top:30px;

width:100%;

height:60px;

border:none;

border-radius:18px;

font-size:20px;

font-weight:700;

cursor:pointer;

background:
linear-gradient(#FFE45E,#FFB800);

transition:.25s;

}

button:active{

transform:scale(.96);

}

.stats{

margin-top:30px;

background:#202020;

padding:18px;

border-radius:15px;

}

.stats h3{

font-size:28px;

color:#FFD700;

}

.stats p{

margin-top:6px;

}

@keyframes float{

0%{transform:translateY(0);}
50%{transform:translateY(-15px);}
100%{transform:translateY(0);}

}

@keyframes bounce{

0%,100%{

transform:scale(1);

}

50%{

transform:scale(1.15);

}

}

@keyframes fadeUp{

from{

opacity:0;

transform:translateY(40px);

}

to{

opacity:1;

transform:none;

}

}

</style>

</head>

<body>

<div class="banner">

<img src="assets/topban.png">

</div>

<div class="card">

<div class="success">

🎉

</div>

<h1>

Congratulations!

</h1>

<p>

You have successfully unlocked a prize.

Complete your registration to verify your lucky draw entry.

</p>

<div class="prize">

<img id="prizeImage"
src="assets/wini.png">

</div>

<div class="verify">

⚡ Verification takes less than 30 seconds.

<br><br>

Your prize will remain reserved until verification is completed.

</div>

<button onclick="location.href='register.html'">

CONTINUE →

</button>

<div class="stats">

<h3>

18,247+

</h3>

<p>

People joined today

</p>

</div>

</div>

<script>

const prizes=[

"assets/wini.png",

"assets/winm.png",

"assets/winb.png"

];

document.getElementById("prizeImage").src=

prizes[Math.floor(Math.random()*3)];

</script>

</body>

</html>
